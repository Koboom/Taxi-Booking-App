    <script>
      function setCookie(cname, cvalue, exdays) { // cookiename, cookievalue, days
        const d = new Date();
        d.setTime(d.getTime() + (exdays * 24 * 60 * 60 * 1000));
        let expires = "expires=" + d.toUTCString();
        document.cookie = cname + "=" + cvalue + ";" + expires + ";path=/";
      }

      function getCookie(cname) { //cookiename is parameter
        let name = cname + "="; //create name for search
        let decodedCookie = decodeURIComponent(document.cookie); //decode the cookie string, to handle cookies with special characters,'$,€'
        let ca = decodedCookie.split(";"); //into an array called ca
        for (let i = 0; i < ca.length; i++) { //loop through the ca array
          let c = ca[i]; //each value ca
          while (c.charAt(0) == ' ') {  // The zero-based index of the desired character.
            c = c.substring(1); //Returns the substring at the specified location within a String object.
          }
          if (c.indexOf(name) == 0) { // if the cookie is found
            return c.substring(name.length, c.length);
          }
        }
        return ""; // if the cookie is not found
      }

      function checkCookie() {
        let user = getCookie("username");
        if (user != "") {
          // alert("Welcome again "+ user)
        } else {
          user = prompt("Please enter your name: ", "");
          if (user != "" && user != null) {
            setCookie("username", user, 30);
          }
        }
      }
    </script>
